name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r service_files/requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build EXE
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build
          Copy-Item service_files\WB_Shipment.spec -Destination build\
          Push-Location build
          pyinstaller WB_Shipment.spec
          Pop-Location

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: WB_Shipment
          path: build/dist/WB_Shipment.exe
